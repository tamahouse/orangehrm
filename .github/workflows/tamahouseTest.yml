name: Build, Push & Test OrangeHRM

on:
    push:
        branches: ["master"]
        
        
jobs:
    e2e-test:
        runs-on: ubuntu-latest
        
        strategy:
            matrix:
                browser: [chrome, firefox]
        
        steps:
            - name: Checkout orangehrm code
              uses: actions/checkout@v4
              
            - name: Install jq
              run: sudo apt-get update && sudo apt-get install -y jq

              
            - name: Find latest version on Docker Hub
              run: | 
                LATEST=$(curl -s https://registry.hub.docker.com/v2/repositories/tamahouse/orangehrm/tags?page_size=100 \
                | jq -r '.results[].name' \
                | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -V \
                | tail -n 1) 

                if [ -z "$LATEST" ]; then
                    LATEST="0.0.0"
                fi
               
                NEW_TAG=$(echo $LATEST | awk -F. '{print$1"."$2"."($3+1)}')
                echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
               
            - name: Check if image exists
              id: check_image
              run: |
                if sudo docker image inspect orangehrm:${{ env.NEW_TAG }} > /dev/null 2>&1; then
                echo "exists=true" >> $GITHUB_OUTPUT
                else
                echo "exists=false" >> $GITHUB_OUTPUT
                fi

            - name: Build image
              if: steps.check_image.outputs.exists == 'false'
              run: sudo docker build -t orangehrm:${{ env.NEW_TAG }} .
              
            - name: Run image
              run: sudo docker run -d orangehrm:${{ env.NEW_TAG }}
              
            - name: Cleanup
              if: always()
              run: sudo docker rm -f orangehrm:${{ env.NEW_TAG }}
              
            - name: Tag images with NEW_TAG
              run: sudo docker tag orangehrm:${{ env.NEW_TAG }} tamahouse/orangehrm:${{ env.NEW_TAG }}
              
            - name: Login Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{secrets.DOCKER_USERNAME}}
                password: ${{secrets.DOCKER_PAT}}
                            
            - name: Push image with NEW_TAG
              run: docker push tamahouse/orangehrm:${{ env.NEW_TAG }}
              
            - name: Stop container with label orangehrm
              run: sudo docker ps -q --filter "label=app=orangehrm" | xargs -r docker stop
              
            - name: Remove OrangeHRM
              run: sudo docker ps -aq --filter "label=app=orangehrm" | xargs -r docker rm
              
            - name: Get traefik từ repo
              uses: actions/checkout@v4
              with:
                repository: tamahouse/orangehrm-traefik
                path: orangehrm-traefik
                token: ${{secrets.GITHUB_TOKEN}}
              
            - name: Deploy
              run: |
                cd orangehrm-traefik
                export TAG=${{ env.NEW_TAG }}
                echo "Deploy version: $TAG"
                docker compose pull
                docker compose up -d
            
            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '17'
                
            - name: Get code auto từ repo
              uses: actions/checkout@v4
              with:
                repository: tamahouse/orangehrm-demo-automation
                path: automation
                token: ${{secrets.GITHUB_TOKEN}}
                
            - name: Verify automation repo
              run: |
                echo "=== ROOT ==="
                ls -la
                echo "=== AUTOMATION ==="
                ls -la automation || echo "❌ automation NOT FOUND"
                
            - name: Start Selenium
              run: sudo docker run -d -p 4444:4444 --name selenium selenium/standalone-${{ matrix.browser }}
                
            - name: Run Test
              working-directory: automation
              run: mvn clean test -Pregression -Devn=staging -Dbrowser=${{ matrix.browser }} -DbaseUrl=https://chaseqa.duckdns.org -DremoteUrl=http://localhost:4444
            
            - name: Generate Allure report
              if: always()
              run: cd automation && mvn io.qameta.allure:allure-maven:report
                
            - name: Upload Allure report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: allure-report
                path: automation/target/site/allure-maven-plugin/
                
                      # 🧹 Cleanup
            - name: Stop Selenium
              if: always()
              run: docker rm -f selenium
            
            - name: Tag latest
              run: sudo docker tag tamahouse/orangehrm:${{env.NEW_TAG}} tamahouse/orangehrm:latest
              
            - name: Tag images with latest
              run: sudo docker push tamahouse/orangehrm:latest
              
               
            
        