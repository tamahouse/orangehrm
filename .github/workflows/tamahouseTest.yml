name: Build, Push & Test OrangeHRM

on:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  # ==========================================
  # 1. BUILD + DEPLOY
  # ==========================================
  build-deploy:
    runs-on: ubuntu-latest
    outputs:
      temp_tag: ${{ steps.set_tag.outputs.temp_tag }}
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest version
        id: get_version
        run: |
          git fetch --tags
          VERSION=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          if [ -z "$VERSION" ]; then VERSION="v1.0.0"; fi
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Bump version
        id: bump
        run: |
          VERSION=${CURRENT_VERSION#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_VERSION="$major.$minor.$((patch+1))"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Set temp tag
        id: set_tag
        run: echo "temp_tag=temp-${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and Push Temp Image
        run: |
          docker build -t tamahouse/orangehrm:${{ steps.set_tag.outputs.temp_tag }} .
          docker push tamahouse/orangehrm:${{ steps.set_tag.outputs.temp_tag }}

      - name: Checkout traefik repo
        uses: actions/checkout@v4
        with:
          repository: tamahouse/orangehrm-traefik
          path: orangehrm-traefik
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Staging
        run: |
          cd orangehrm-traefik
          export TAG=${{ steps.set_tag.outputs.temp_tag }}
          docker compose up -d

  # ==========================================
  # 2. TEST (MATRIX)
  # ==========================================
  e2e-test:
    needs: build-deploy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    steps:
      - name: Checkout automation
        uses: actions/checkout@v4
        with:
          repository: tamahouse/orangehrm-demo-automation
          path: automation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Start Selenium
        run: docker run -d -p 4444:4444 --name selenium selenium/standalone-${{ matrix.browser }}

      - name: Run Test
        working-directory: automation
        run: |
          mvn clean test -Pregression -Devn=staging -Dbrowser=${{ matrix.browser }} \
          -DbaseUrl=https://chaseqa.duckdns.org -DremoteUrl=http://localhost:4444

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: automation/target/allure-results

  # ==========================================
  # 3. REPORT + PROMOTE + TAG
  # ==========================================
  post-process:
    needs: [build-deploy, e2e-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
    
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          path: merged-results
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: merged-results
          allure_report: allure-report

      - name: Login Docker
        if: needs.e2e-test.result == 'success'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Promote Image
        if: needs.e2e-test.result == 'success'
        run: |
          TEMP_TAG=${{ needs.build-deploy.outputs.temp_tag }}
          NEW_VER=${{ needs.build-deploy.outputs.new_version }}
          docker pull tamahouse/orangehrm:$TEMP_TAG
          docker tag tamahouse/orangehrm:$TEMP_TAG tamahouse/orangehrm:$NEW_VER
          docker tag tamahouse/orangehrm:$TEMP_TAG tamahouse/orangehrm:stable
          docker push tamahouse/orangehrm:$NEW_VER
          docker push tamahouse/orangehrm:stable
            

      - name: Create Git Tag
        if: needs.e2e-test.result == 'success'
        run: |
          git config user.name "tamahouse"
          git config user.email "tamahouse@github.com"
          git tag v${{ needs.build-deploy.outputs.new_version }}
          git push origin v${{ needs.build-deploy.outputs.new_version }}